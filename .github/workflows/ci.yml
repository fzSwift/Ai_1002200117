name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/

      - name: Run evaluation benchmark gate
        run: |
          python -m src.evaluation.run_evaluation
          python - <<'PY'
          import json, pathlib, sys
          p = pathlib.Path("outputs/benchmark_metrics.json")
          if not p.exists():
              print("benchmark metrics missing")
              sys.exit(1)
          m = json.loads(p.read_text())
          # conservative gates to prevent regressions
          if m.get("abstention_correctness", 0) < 0.5:
              print("abstention_correctness below threshold", m)
              sys.exit(1)
          if m.get("citation_precision", 0) < 0.5:
              print("citation_precision below threshold", m)
              sys.exit(1)
          print("benchmark gate passed", m)
          PY
